<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minesweeper Hormuz</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            --neon-cyan: #00ffff;
            --danger-red: #ff4444;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #e0e0e0;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            height: 100vh;
            touch-action: manipulation;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: brightness(0.6) contrast(1.1);
            pointer-events: none;
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .ui-header {
            pointer-events: auto;
            background: rgba(10, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-cyan);
            padding: 0.5rem 1rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 255, 255, 0.2);
            z-index: 20;
        }

        .difficulty-btn {
            padding: 2px 6px;
            font-size: 9px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s;
        }

        .difficulty-btn.active {
            background: var(--neon-cyan);
            color: black;
            border-color: var(--neon-cyan);
        }

        .grid-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        .grid-container {
            pointer-events: auto;
            display: grid;
            gap: 1px;
            background: rgba(0, 255, 255, 0.2); 
            border: 2px solid var(--neon-cyan);
            width: fit-content;
            max-width: 95vw;
            max-height: 75vh;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }

        .cell {
            aspect-ratio: 1 / 1; 
            min-width: 25px;
            min-height: 25px;
            background: rgba(10, 30, 50, 0.7); 
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: clamp(10px, 3vw, 16px);
            font-weight: bold;
            transition: background 0.1s;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        /* Øk størrelsen på mobil spesifikt */
        @media (max-width: 640px) {
            .cell {
                min-width: 35px;
                min-height: 35px;
            }
        }

        .cell.land {
            visibility: hidden;
            pointer-events: none;
        }

        .debug-active .cell.land {
            visibility: visible;
            background: rgba(255, 0, 0, 0.2);
        }

        .cell:hover:not(.revealed) {
            background: rgba(0, 255, 255, 0.4);
        }

        .cell.revealed {
            background: rgba(255, 255, 255, 0.05); 
        }

        .cell.mine {
            background: rgba(255, 0, 0, 0.9) !important;
            color: white;
        }

        .cell.flagged {
            color: #ffcc00;
        }

        .num-1 { color: #60a5fa; }
        .num-2 { color: #34d399; }
        .num-3 { color: #f87171; }
        .num-4 { color: #a78bfa; }
        .num-5 { color: #fbbf24; }

        #status-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            text-align: center;
            background: rgba(0, 10, 20, 0.95);
            padding: 2rem;
            border: 2px solid var(--neon-cyan);
            display: none;
            pointer-events: auto;
            width: 85%;
            max-width: 400px;
        }

        .debug-toggle {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 50;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 4px 8px;
            font-size: 10px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="game-overlay">
        <div class="ui-header">
            <div class="flex flex-col">
                <h1 class="text-xs md:text-sm font-bold text-cyan-400">OPERASJON HORMUZ</h1>
                <div class="flex gap-1 mt-1">
                    <button onclick="setDifficulty('easy')" id="btn-easy" class="difficulty-btn">LETT</button>
                    <button onclick="setDifficulty('medium')" id="btn-medium" class="difficulty-btn active">MID</button>
                    <button onclick="setDifficulty('expert')" id="btn-expert" class="difficulty-btn">EKSP</button>
                </div>
            </div>
            
            <div class="flex gap-4">
                <div class="text-center">
                    <div class="text-[8px] opacity-60">MINER</div>
                    <div id="mine-count" class="text-sm font-bold text-cyan-400">0</div>
                </div>
                <div class="text-center">
                    <div class="text-[8px] opacity-60">TID</div>
                    <div id="timer" class="text-sm font-bold text-cyan-400">0</div>
                </div>
            </div>
            
            <button onclick="initGame()" class="border border-cyan-400 px-3 py-1 text-[10px] hover:bg-cyan-400 hover:text-black transition uppercase font-bold">Reset</button>
        </div>

        <div class="grid-wrapper">
            <div id="game-grid" class="grid-container"></div>
        </div>
        
        <button onclick="toggleDebug()" class="debug-toggle">DEBUG OFF</button>
    </div>

    <div id="status-overlay">
        <h2 id="status-text" class="text-2xl font-bold mb-2 text-cyan-400"></h2>
        <p id="status-sub" class="mb-6 opacity-80 text-xs"></p>
        <button onclick="initGame()" class="bg-cyan-400 text-black px-6 py-2 font-bold uppercase text-xs">Prøv Igjen</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            center: [26.25, 55.85], 
            zoom: 8,
            zoomControl: false,
            dragging: false,
            scrollWheelZoom: false,
            doubleClickZoom: false,
            touchZoom: false,
            boxZoom: false,
            tap: false
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        const difficulties = {
            easy: { rows: 11, cols: 18, mineDensity: 0.12 },
            medium: { rows: 17, cols: 28, mineDensity: 0.16 },
            expert: { rows: 23, cols: 38, mineDensity: 0.20 }
        };

        let currentDiff = 'medium';
        let board = [];
        let gameOver = false;
        let timerInterval;
        let seconds = 0;
        let totalMines = 0;
        let isDebug = false;

        const landPolygons = [
            [[54.7003, 24.7927], [55.3, 25.2], [55.9, 25.8], [56.1, 26.2], [56.25, 26.35], [56.45, 26.4], [56.5, 26.3], [56.35, 26.0], [56.4519, 24.7578]],
            [[53.5, 27.3], [53.6077, 26.7901], [54.4313, 26.7067], [54.7003, 26.5398], [55.2, 26.65], [55.6, 26.85], [55.9, 27.1], [56.1, 27.15], [56.5, 27.15], [56.8, 27.05], [57.3579, 25.8697], [58.2748, 25.6224], [58.3792, 27.703]],
            [[55.25, 26.55], [55.25, 26.65], [55.7, 26.8], [56.1, 26.95], [56.25, 26.9], [56.1, 26.75], [55.7, 26.65]],
            [[56.42, 27.02], [56.42, 27.10], [56.52, 27.10], [56.52, 27.02]],
            [[56.33, 26.83], [56.33, 26.90], [56.44, 26.90], [56.44, 26.83]]
        ];

        function isPointOnLand(x, y) {
            for (let poly of landPolygons) {
                let inside = false;
                for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                    let xi = poly[i][0], yi = poly[i][1];
                    let xj = poly[j][0], yj = poly[j][1];
                    let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                    if (intersect) inside = !inside;
                }
                if (inside) return true;
            }
            return false;
        }

        function setDifficulty(level) {
            currentDiff = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${level}`).classList.add('active');
            initGame();
        }

        function initGame() {
            const gridElement = document.getElementById('game-grid');
            let config = {...difficulties[currentDiff]};
            
            // Tilpass for mobil: Halver kolonner, øk rader med 50%
            if (window.innerWidth < 640) {
                config.cols = Math.max(8, Math.floor(config.cols / 2));
                config.rows = Math.floor(config.rows * 1.5);
            }

            gridElement.innerHTML = '';
            gridElement.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
            document.getElementById('status-overlay').style.display = 'none';
            
            board = [];
            gameOver = false;
            seconds = 0;
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = 0;

            for (let r = 0; r < config.rows; r++) {
                board[r] = [];
                for (let c = 0; c < config.cols; c++) {
                    const cellEl = document.createElement('div');
                    cellEl.className = 'cell';
                    
                    const cell = {
                        r, c, el: cellEl,
                        isMine: false, revealed: false, flagged: false, onLand: false, neighbors: 0
                    };

                    // Touch-håndtering (Long press for flagg)
                    let touchTimer;
                    cellEl.addEventListener('touchstart', (e) => {
                        if (gameOver) return;
                        touchTimer = setTimeout(() => {
                            toggleFlag(r, c);
                            touchTimer = null;
                        }, 400);
                    }, {passive: true});

                    cellEl.addEventListener('touchend', (e) => {
                        if (touchTimer) {
                            clearTimeout(touchTimer);
                            touchTimer = null;
                            reveal(r, c);
                        }
                    });

                    // Mus-håndtering
                    cellEl.onmousedown = (e) => {
                        if (gameOver) return;
                        if (e.button === 2) toggleFlag(r, c);
                        else if (e.button === 0) reveal(r, c);
                    };

                    cellEl.oncontextmenu = (e) => e.preventDefault();

                    gridElement.appendChild(cellEl);
                    board[r][c] = cell;
                }
            }

            // Plasser land og miner
            setTimeout(() => {
                let waterCells = [];
                for (let r = 0; r < config.rows; r++) {
                    for (let c = 0; c < config.cols; c++) {
                        const cell = board[r][c];
                        const rect = cell.el.getBoundingClientRect();
                        const latlng = map.containerPointToLatLng([rect.left + rect.width/2, rect.top + rect.height/2]);
                        
                        if (isPointOnLand(latlng.lng, latlng.lat)) {
                            cell.onLand = true;
                            cell.el.classList.add('land');
                        } else {
                            waterCells.push(cell);
                        }
                    }
                }

                totalMines = Math.floor(waterCells.length * config.mineDensity);
                document.getElementById('mine-count').innerText = totalMines;

                let placed = 0;
                while (placed < totalMines) {
                    const cell = waterCells[Math.floor(Math.random() * waterCells.length)];
                    if (!cell.isMine) {
                        cell.isMine = true;
                        placed++;
                    }
                }

                board.forEach(row => row.forEach(cell => {
                    if (cell.onLand || cell.isMine) return;
                    let count = 0;
                    for(let dr=-1; dr<=1; dr++) {
                        for(let dc=-1; dc<=1; dc++) {
                            if (board[cell.r+dr]?.[cell.c+dc]?.isMine) count++;
                        }
                    }
                    cell.neighbors = count;
                }));

                timerInterval = setInterval(() => {
                    seconds++;
                    document.getElementById('timer').innerText = seconds;
                }, 1000);
            }, 100);
        }

        function toggleFlag(r, c) {
            const cell = board[r][c];
            if (cell.revealed || gameOver) return;
            cell.flagged = !cell.flagged;
            cell.el.innerText = cell.flagged ? '🚩' : '';
            cell.el.classList.toggle('flagged', cell.flagged);
            
            let flags = 0;
            board.flat().forEach(c => { if(c.flagged) flags++; });
            document.getElementById('mine-count').innerText = totalMines - flags;
        }

        function reveal(r, c) {
            const cell = board[r]?.[c];
            if (!cell || cell.revealed || cell.flagged || cell.onLand || gameOver) return;

            cell.revealed = true;
            cell.el.classList.add('revealed');

            if (cell.isMine) {
                endGame(false);
                return;
            }

            if (cell.neighbors > 0) {
                cell.el.innerText = cell.neighbors;
                cell.el.classList.add(`num-${cell.neighbors}`);
            } else {
                for(let dr=-1; dr<=1; dr++) {
                    for(let dc=-1; dc<=1; dc++) {
                        reveal(r+dr, c+dc);
                    }
                }
            }
            checkWin();
        }

        function checkWin() {
            const won = board.flat().every(c => c.onLand || c.isMine || c.revealed);
            if (won) endGame(true);
        }

        function endGame(win) {
            gameOver = true;
            clearInterval(timerInterval);
            board.flat().forEach(c => {
                if (c.isMine) {
                    c.el.classList.add('mine');
                    c.el.innerText = '💣';
                }
            });
            const overlay = document.getElementById('status-overlay');
            document.getElementById('status-text').innerText = win ? "SEIER" : "KATASTROFE";
            document.getElementById('status-sub').innerText = win ? "Hormuzstredet er ryddet!" : "Radarovervåkningen brutt.";
            overlay.style.display = 'block';
        }

        function toggleDebug() {
            isDebug = !isDebug;
            document.body.classList.toggle('debug-active', isDebug);
        }

        window.addEventListener('resize', () => {
            clearTimeout(window.rt);
            window.rt = setTimeout(initGame, 300);
        });

        window.onload = initGame;
    </script>
</body>
</html>
