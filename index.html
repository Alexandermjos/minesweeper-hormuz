<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper Hormuz</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            --neon-cyan: #00ffff;
            --danger-red: #ff4444;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #e0e0e0;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: brightness(0.7) contrast(1.1) saturate(0.9);
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .ui-header {
            pointer-events: auto;
            background: rgba(10, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-cyan);
            padding: 0.75rem 1.5rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 255, 255, 0.2);
            z-index: 20;
        }

        .difficulty-btn {
            padding: 2px 8px;
            font-size: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s;
        }

        .difficulty-btn.active {
            background: var(--neon-cyan);
            color: black;
            border-color: var(--neon-cyan);
        }

        .grid-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .grid-container {
            pointer-events: auto;
            display: grid;
            gap: 1px;
            background: rgba(0, 255, 255, 0.2); 
            border: 2px solid var(--neon-cyan);
            width: 90vw;
            max-width: 950px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }

        .cell {
            aspect-ratio: 1 / 1; 
            width: 100%;
            background: rgba(10, 30, 50, 0.6); 
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: clamp(8px, 1.2vw, 14px);
            font-weight: bold;
            transition: background 0.1s;
            user-select: none;
        }

        .cell.land {
            visibility: hidden;
            pointer-events: none;
        }

        /* Debug styling for land cells */
        .debug-active .cell.land {
            visibility: visible;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        .cell:hover:not(.revealed) {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: inset 0 0 5px var(--neon-cyan);
        }

        .cell.revealed {
            background: rgba(255, 255, 255, 0.05); 
        }

        .cell.mine {
            background: rgba(255, 0, 0, 0.9) !important;
            color: white;
            box-shadow: 0 0 10px red;
        }

        .cell.flagged {
            color: #ffcc00;
        }

        .num-1 { color: #60a5fa; text-shadow: 1px 1px 2px black; }
        .num-2 { color: #34d399; text-shadow: 1px 1px 2px black; }
        .num-3 { color: #f87171; text-shadow: 1px 1px 2px black; }
        .num-4 { color: #a78bfa; text-shadow: 1px 1px 2px black; }
        .num-5 { color: #fbbf24; text-shadow: 1px 1px 2px black; }

        #status-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            text-align: center;
            background: rgba(0, 10, 20, 0.95);
            padding: 2.5rem;
            border: 2px solid var(--neon-cyan);
            display: none;
            pointer-events: auto;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
        }

        .btn-restart {
            margin-top: 1.5rem;
            background: var(--neon-cyan);
            color: #000;
            padding: 10px 25px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
        }

        .debug-toggle {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 50;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 5px 10px;
            font-size: 10px;
            cursor: pointer;
        }
        
        /* Debug label on map */
        .debug-label {
            background: rgba(0,0,0,0.8);
            border: 1px solid red;
            color: white;
            padding: 2px 4px;
            font-size: 9px;
            border-radius: 3px;
            white-space: nowrap;
        }
    </style>
</head>
<body class="">

    <div id="map"></div>

    <div class="game-overlay">
        <div class="ui-header">
            <div class="flex flex-col">
                <h1 class="text-lg font-bold text-cyan-400 leading-none">MINESWEEPER HORMUZ</h1>
                <div class="flex gap-2 mt-2">
                    <button onclick="setDifficulty('easy')" id="btn-easy" class="difficulty-btn">LETT</button>
                    <button onclick="setDifficulty('medium')" id="btn-medium" class="difficulty-btn active">MEDIUM</button>
                    <button onclick="setDifficulty('expert')" id="btn-expert" class="difficulty-btn">EKSPERT</button>
                </div>
            </div>
            
            <div class="flex gap-8">
                <div class="text-center">
                    <div class="text-[9px] opacity-60">MINER</div>
                    <div id="mine-count" class="text-lg font-bold text-cyan-400">0</div>
                </div>
                <div class="text-center">
                    <div class="text-[9px] opacity-60">TID</div>
                    <div id="timer" class="text-lg font-bold text-cyan-400">0</div>
                </div>
            </div>
            
            <button onclick="initGame()" class="border border-cyan-400 px-4 py-1 text-[12px] hover:bg-cyan-400 hover:text-black transition uppercase font-bold">Reset</button>
        </div>

        <div class="grid-wrapper">
            <div id="game-grid" class="grid-container"></div>
        </div>
        
        <button onclick="toggleDebug()" class="debug-toggle">DEBUG MODE: OFF</button>
    </div>

    <div id="status-overlay">
        <h2 id="status-text" class="text-3xl font-bold mb-4 text-cyan-400"></h2>
        <p id="status-sub" class="mb-6 opacity-80 text-sm"></p>
        <button onclick="initGame()" class="btn-restart text-sm">Prøv Igjen</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            center: [26.25, 55.85], 
            zoom: 8,
            zoomControl: false,
            dragging: false,
            scrollWheelZoom: false,
            doubleClickZoom: false
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap & CARTO'
        }).addTo(map);

        const difficulties = {
            easy: { rows: 11, cols: 18, mineDensity: 0.12 },
            medium: { rows: 17, cols: 28, mineDensity: 0.16 },
            expert: { rows: 23, cols: 38, mineDensity: 0.20 }
        };

        let currentDiff = 'medium';
        let board = [];
        let gameOver = false;
        let timerInterval;
        let seconds = 0;
        let totalMines = 0;
        let isDebug = false;
        let debugLayer = L.layerGroup().addTo(map);

        const landPolygons = [
            // UAE / Musandam
            [[55.0, 25.0], [55.3, 25.2], [55.9, 25.8], [56.1, 26.2], [56.25, 26.35], [56.45, 26.4], [56.5, 26.3], [56.35, 26.0], [56.35, 25.0]],
            // Iran Fastland
            [[53.5, 27.3], [53.5, 26.5], [55.2, 26.65], [55.6, 26.85], [55.9, 27.1], [56.1, 27.15], [56.5, 27.15], [56.8, 27.05], [57.5, 27.05], [57.5, 27.5]],
            // Qeshm Island
            [[55.25, 26.55], [55.25, 26.65], [55.7, 26.8], [56.1, 26.95], [56.25, 26.9], [56.1, 26.75], [55.7, 26.65]],
            // Hormuz Island
            [[56.42, 27.02], [56.42, 27.10], [56.52, 27.10], [56.52, 27.02]],
            // Larak Island
            [[56.33, 26.83], [56.33, 26.90], [56.44, 26.90], [56.44, 26.83]]
        ];

        function toggleDebug() {
            isDebug = !isDebug;
            document.body.classList.toggle('debug-active', isDebug);
            document.querySelector('.debug-toggle').innerText = `DEBUG MODE: ${isDebug ? 'ON' : 'OFF'}`;
            drawDebugPoints();
        }

        function drawDebugPoints() {
            debugLayer.clearLayers();
            if (!isDebug) return;

            landPolygons.forEach((poly, polyIdx) => {
                // Tegn linjer mellom punktene
                const latLngs = poly.map(p => [p[1], p[0]]);
                L.polygon(latLngs, {color: 'red', weight: 1, fill: false, dashArray: '5, 5'}).addTo(debugLayer);

                // Tegn hvert punkt
                poly.forEach((point, pointIdx) => {
                    const lng = point[0];
                    const lat = point[1];
                    
                    L.circleMarker([lat, lng], {
                        radius: 4,
                        color: 'red',
                        fillColor: '#f03',
                        fillOpacity: 0.8
                    }).addTo(debugLayer)
                    .bindTooltip(`${lng}, ${lat}`, {
                        permanent: true, 
                        direction: 'top',
                        className: 'debug-label'
                    });
                });
            });
        }

        function isPointOnLand(x, y) {
            for (let poly of landPolygons) {
                let inside = false;
                for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                    let xi = poly[i][0], yi = poly[i][1];
                    let xj = poly[j][0], yj = poly[j][1];
                    let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                    if (intersect) inside = !inside;
                }
                if (inside) return true;
            }
            return false;
        }

        function setDifficulty(level) {
            currentDiff = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${level}`).classList.add('active');
            initGame();
        }

        function initGame() {
            const gridElement = document.getElementById('game-grid');
            const statusOverlay = document.getElementById('status-overlay');
            const config = difficulties[currentDiff];
            
            gridElement.innerHTML = '';
            gridElement.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
            statusOverlay.style.display = 'none';
            
            board = [];
            gameOver = false;
            seconds = 0;
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = 0;
            document.getElementById('mine-count').innerText = "...";

            for (let r = 0; r < config.rows; r++) {
                board[r] = [];
                for (let c = 0; c < config.cols; c++) {
                    const cell = {
                        r, c,
                        isMine: false,
                        revealed: false,
                        flagged: false,
                        onLand: false,
                        neighborMines: 0,
                        el: document.createElement('div')
                    };
                    cell.el.className = 'cell';
                    gridElement.appendChild(cell.el);
                    board[r][c] = cell;
                }
            }

            setTimeout(() => {
                let waterCells = [];

                for (let r = 0; r < config.rows; r++) {
                    for (let c = 0; c < config.cols; c++) {
                        const cell = board[r][c];
                        const rect = cell.el.getBoundingClientRect();
                        const centerX = rect.left + rect.width / 2;
                        const centerY = rect.top + rect.height / 2;
                        
                        const latlng = map.containerPointToLatLng([centerX, centerY]);
                        
                        if (isPointOnLand(latlng.lng, latlng.lat)) {
                            cell.onLand = true;
                            cell.el.classList.add('land');
                        } else {
                            waterCells.push(cell);
                            cell.el.onmousedown = (e) => handleCellClick(e, r, c);
                            cell.el.oncontextmenu = (e) => e.preventDefault();
                        }
                    }
                }

                totalMines = Math.floor(waterCells.length * config.mineDensity);
                document.getElementById('mine-count').innerText = totalMines;

                let placed = 0;
                while (placed < totalMines) {
                    const idx = Math.floor(Math.random() * waterCells.length);
                    if (!waterCells[idx].isMine) {
                        waterCells[idx].isMine = true;
                        placed++;
                    }
                }

                for (let cell of waterCells) {
                    if (cell.isMine) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            let nr = cell.r + dr, nc = cell.c + dc;
                            if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols) {
                                if (board[nr][nc].isMine) count++;
                            }
                        }
                    }
                    cell.neighborMines = count;
                }

                timerInterval = setInterval(() => {
                    seconds++;
                    document.getElementById('timer').innerText = seconds;
                }, 1000);

                if(isDebug) drawDebugPoints();

            }, 50);
        }

        function handleCellClick(e, r, c) {
            if (gameOver) return;
            if (e.button === 2) {
                toggleFlag(r, c);
            } else {
                reveal(r, c);
            }
        }

        function toggleFlag(r, c) {
            const cell = board[r][c];
            if (cell.revealed) return;
            cell.flagged = !cell.flagged;
            cell.el.innerText = cell.flagged ? '🚩' : '';
            cell.el.classList.toggle('flagged', cell.flagged);
            
            let flags = 0;
            board.forEach(row => row.forEach(c => { if(c.flagged) flags++; }));
            document.getElementById('mine-count').innerText = totalMines - flags;
        }

        function reveal(r, c) {
            const config = difficulties[currentDiff];
            const cell = board[r][c];
            if (cell.revealed || cell.flagged || cell.onLand || gameOver) return;

            cell.revealed = true;
            cell.el.classList.add('revealed');

            if (cell.isMine) {
                endGame(false);
                return;
            }

            if (cell.neighborMines > 0) {
                cell.el.innerText = cell.neighborMines;
                cell.el.classList.add(`num-${cell.neighborMines}`);
            } else {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        let nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols) {
                            reveal(nr, nc);
                        }
                    }
                }
            }
            checkWin();
        }

        function checkWin() {
            const config = difficulties[currentDiff];
            let win = true;
            for (let r = 0; r < config.rows; r++) {
                for (let c = 0; c < config.cols; c++) {
                    if (!board[r][c].onLand && !board[r][c].isMine && !board[r][c].revealed) {
                        win = false;
                    }
                }
            }
            if (win) endGame(true);
        }

        function endGame(isWin) {
            gameOver = true;
            clearInterval(timerInterval);
            const overlay = document.getElementById('status-overlay');
            const text = document.getElementById('status-text');
            const sub = document.getElementById('status-sub');
            
            board.forEach(row => row.forEach(cell => {
                if (cell.isMine) {
                    cell.el.classList.add('mine');
                    cell.el.innerText = '💣';
                }
            }));

            overlay.style.display = 'block';
            if (isWin) {
                text.innerText = "SEIER";
                sub.innerText = "Hormuzstredet er nå trygt for sivil skipsfart.";
            } else {
                text.innerText = "KATASTROFE";
                sub.innerText = "Radarovervåkningen ble brutt ved detonasjon.";
            }
        }

        window.addEventListener('resize', () => {
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(initGame, 300);
        });

        window.onload = initGame;
    </script>
</body>
</html>
