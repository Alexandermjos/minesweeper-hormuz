<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minesweeper Hormuz</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            --neon-cyan: #00ffff;
            --danger-red: #ff4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: #e0e0e0;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: brightness(0.4) contrast(1.3);
            pointer-events: none;
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .ui-header {
            pointer-events: auto;
            background: rgba(10, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-cyan);
            padding: 0.6rem 1rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .difficulty-btn {
            padding: 4px 8px;
            font-size: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            cursor: pointer;
            color: var(--neon-cyan);
        }

        .difficulty-btn.active {
            background: var(--neon-cyan);
            color: black;
        }

        .grid-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            pointer-events: none;
        }

        .grid-container {
            pointer-events: auto;
            display: grid;
            gap: 1px;
            background: rgba(0, 255, 255, 0.2); 
            border: 2px solid var(--neon-cyan);
            width: fit-content;
            height: fit-content;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);
            place-content: center;
        }

        .cell {
            aspect-ratio: 1 / 1;
            width: 28px;
            height: 28px;
            background: rgba(10, 30, 50, 0.85); 
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            user-select: none;
            transition: background 0.1s;
        }

        @media (max-width: 640px) {
            .cell {
                width: 32px;
                height: 32px;
            }
        }

        /* Long press visuell indikator */
        .cell:active:not(.revealed) {
            background: rgba(0, 255, 255, 0.3);
        }

        .cell.land {
            visibility: hidden;
            pointer-events: none;
        }

        .cell.revealed { background: rgba(255, 255, 255, 0.05); }
        .cell.mine { background: rgba(255, 0, 0, 0.9) !important; color: white; }
        .cell.flagged { color: #ffcc00; font-size: 18px; }

        .num-1 { color: #60a5fa; }
        .num-2 { color: #34d399; }
        .num-3 { color: #f87171; }
        .num-4 { color: #c084fc; }

        #status-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: rgba(0, 10, 20, 0.95);
            padding: 2rem;
            border: 2px solid var(--neon-cyan);
            display: none;
            pointer-events: auto;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .debug-toggle {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 50;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 4px;
            font-size: 9px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="game-overlay">
        <div class="ui-header">
            <div>
                <h1 class="text-[10px] font-bold text-cyan-400">OPERASJON HORMUZ</h1>
                <div class="flex gap-1 mt-1">
                    <button onclick="setDifficulty('easy')" id="btn-easy" class="difficulty-btn">LOW</button>
                    <button onclick="setDifficulty('medium')" id="btn-medium" class="difficulty-btn active">MID</button>
                    <button onclick="setDifficulty('expert')" id="btn-expert" class="difficulty-btn">MAX</button>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="text-right">
                    <div class="text-[8px] opacity-60 uppercase">Miner</div>
                    <div id="mine-count" class="text-xs font-bold text-cyan-400">0</div>
                </div>
                <div class="text-right">
                    <div class="text-[8px] opacity-60 uppercase">Tid</div>
                    <div id="timer" class="text-xs font-bold text-cyan-400">0</div>
                </div>
                <button onclick="initGame()" class="border border-cyan-400 px-2 py-1 text-[9px] uppercase font-bold text-cyan-400">Reset</button>
            </div>
        </div>

        <div class="grid-wrapper">
            <div id="game-grid" class="grid-container"></div>
        </div>
        
        <button onclick="toggleDebug()" class="debug-toggle">DEBUG OFF</button>
    </div>

    <div id="status-overlay">
        <h2 id="status-text" class="text-xl font-bold mb-4 text-cyan-400"></h2>
        <button onclick="initGame()" class="bg-cyan-400 text-black px-4 py-2 font-bold text-xs">RESTART SYSTEM</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            center: [26.25, 55.85], 
            zoom: 8,
            zoomControl: false, dragging: false, scrollWheelZoom: false,
            doubleClickZoom: false, touchZoom: false, boxZoom: false
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        const landPolygons = [
            [[54.7003, 24.7927], [55.3, 25.2], [55.9, 25.8], [56.1, 26.2], [56.25, 26.35], [56.45, 26.4], [56.5, 26.3], [56.35, 26.0], [56.4519, 24.7578]],
            [[53.5, 27.3], [53.6077, 26.7901], [54.4313, 26.7067], [54.7003, 26.5398], [55.2, 26.65], [55.6, 26.85], [55.9, 27.1], [56.1, 27.15], [56.5, 27.15], [56.8, 27.05], [57.3579, 25.8697], [58.2748, 25.6224], [58.3792, 27.703]],
            [[55.25, 26.55], [55.25, 26.65], [55.7, 26.8], [56.1, 26.95], [56.25, 26.9], [56.1, 26.75], [55.7, 26.65]],
            [[56.42, 27.02], [56.42, 27.10], [56.52, 27.10], [56.52, 27.02]],
            [[56.33, 26.83], [56.33, 26.90], [56.44, 26.90], [56.44, 26.83]]
        ];

        let currentDiff = 'medium';
        let board = [];
        let gameOver = false;
        let timerInterval;
        let seconds = 0;
        let isDebug = false;

        function isPointOnLand(x, y) {
            for (let poly of landPolygons) {
                let inside = false;
                for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                    let xi = poly[i][0], yi = poly[i][1];
                    let xj = poly[j][0], yj = poly[j][1];
                    if (((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
                }
                if (inside) return true;
            }
            return false;
        }

        function setDifficulty(level) {
            currentDiff = level;
            document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${level}`));
            initGame();
        }

        function initGame() {
            const gridEl = document.getElementById('game-grid');
            gridEl.innerHTML = '';
            
            const cellDim = window.innerWidth < 640 ? 33 : 29;
            const availW = window.innerWidth - 10;
            const availH = window.innerHeight - 100;
            
            let cols = Math.floor(availW / cellDim);
            let rows = Math.floor(availH / cellDim);

            const diffs = { easy: 0.1, medium: 0.15, expert: 0.22 };
            
            gridEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            document.getElementById('status-overlay').style.display = 'none';
            board = [];
            gameOver = false;
            seconds = 0;
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = 0;

            for (let r = 0; r < rows; r++) {
                board[r] = [];
                for (let c = 0; c < cols; c++) {
                    const el = document.createElement('div');
                    el.className = 'cell';
                    gridEl.appendChild(el);
                    
                    const cell = { r, c, el, isMine: false, revealed: false, flagged: false, onLand: false, neighbors: 0 };
                    
                    // Avansert touch-håndtering for "Long Press"
                    let touchStartTime = 0;
                    let longPressTimer = null;

                    el.addEventListener('touchstart', (e) => {
                        if (gameOver) return;
                        touchStartTime = Date.now();
                        
                        // Start timer for markering (450ms)
                        longPressTimer = setTimeout(() => {
                            toggleFlag(r, c);
                            longPressTimer = null; // Markerer at flagg er satt
                        }, 450);
                    }, { passive: true });

                    el.addEventListener('touchend', (e) => {
                        if (longPressTimer) {
                            clearTimeout(longPressTimer);
                            longPressTimer = null;
                            
                            // Hvis fingeren slippes før timeren gikk ut, er det et vanlig klikk
                            const duration = Date.now() - touchStartTime;
                            if (duration < 450) {
                                reveal(r, c);
                            }
                        }
                    });

                    el.addEventListener('touchmove', () => {
                        // Avbryt hvis brukeren begynner å bevege fingeren mye (sveiper)
                        if (longPressTimer) {
                            clearTimeout(longPressTimer);
                            longPressTimer = null;
                        }
                    });

                    // Mus-støtte for PC
                    el.onmousedown = (e) => {
                        if (gameOver) return;
                        if (e.button === 2) {
                            e.preventDefault();
                            toggleFlag(r, c);
                        } else if (e.button === 0) {
                            reveal(r, c);
                        }
                    };
                    
                    el.oncontextmenu = (e) => e.preventDefault();
                    board[r][c] = cell;
                }
            }

            setTimeout(() => {
                let water = [];
                board.flat().forEach(cell => {
                    const rect = cell.el.getBoundingClientRect();
                    const latlng = map.containerPointToLatLng([rect.left + rect.width/2, rect.top + rect.height/2]);
                    if (isPointOnLand(latlng.lng, latlng.lat)) {
                        cell.onLand = true;
                        cell.el.classList.add('land');
                    } else {
                        water.push(cell);
                    }
                });

                const totalMines = Math.floor(water.length * diffs[currentDiff]);
                document.getElementById('mine-count').innerText = totalMines;

                let placed = 0;
                while (placed < totalMines) {
                    const c = water[Math.floor(Math.random() * water.length)];
                    if (!c.isMine) { c.isMine = true; placed++; }
                }

                board.forEach(row => row.forEach(c => {
                    if (c.onLand || c.isMine) return;
                    let count = 0;
                    for(let dr=-1; dr<=1; dr++) {
                        for(let dc=-1; dc<=1; dc++) {
                            if (board[c.r+dr]?.[c.c+dc]?.isMine) count++;
                        }
                    }
                    c.neighbors = count;
                }));

                timerInterval = setInterval(() => { seconds++; document.getElementById('timer').innerText = seconds; }, 1000);
            }, 60);
        }

        function toggleFlag(r, c) {
            const cell = board[r][c];
            if (cell.revealed || gameOver) return;
            cell.flagged = !cell.flagged;
            cell.el.innerText = cell.flagged ? '🚩' : '';
            cell.el.classList.toggle('flagged', cell.flagged);
            
            // Oppdater mine-teller basert på flagg (enkel logikk)
            const currentMines = parseInt(document.getElementById('mine-count').innerText);
            // document.getElementById('mine-count').innerText = cell.flagged ? currentMines - 1 : currentMines + 1;
        }

        function reveal(r, c) {
            const cell = board[r]?.[c];
            if (!cell || cell.revealed || cell.flagged || cell.onLand || gameOver) return;
            
            cell.revealed = true;
            cell.el.classList.add('revealed');
            
            if (cell.isMine) { 
                endGame(false); 
                return; 
            }
            
            if (cell.neighbors > 0) {
                cell.el.innerText = cell.neighbors;
                cell.el.classList.add(`num-${cell.neighbors}`);
            } else {
                for(let dr=-1; dr<=1; dr++) { 
                    for(let dc=-1; dc<=1; dc++) { 
                        if (dr !== 0 || dc !== 0) reveal(r+dr, c+dc); 
                    } 
                }
            }
            
            checkWin();
        }

        function checkWin() {
            const won = board.flat().every(c => c.onLand || c.isMine || c.revealed);
            if (won) endGame(true);
        }

        function endGame(win) {
            gameOver = true;
            clearInterval(timerInterval);
            board.flat().forEach(c => { 
                if(c.isMine) { 
                    c.el.classList.add('mine'); 
                    c.el.innerText = '💣'; 
                } 
            });
            document.getElementById('status-text').innerText = win ? "OPPDRAG UTFØRT" : "RADAR DEFEKT";
            document.getElementById('status-overlay').style.display = 'block';
        }

        function toggleDebug() {
            isDebug = !isDebug;
            document.body.classList.toggle('debug-active', isDebug);
            document.querySelector('.debug-toggle').innerText = `DEBUG ${isDebug ? 'ON' : 'OFF'}`;
        }

        window.onresize = initGame;
        window.onload = initGame;
    </script>
</body>
</html>
